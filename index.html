<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>LiveSync — Quản lý mẫu Live</title>
    <meta name="description" content="Hệ thống quản lý lịch livestream chuyên nghiệp — điều phối ca, nhân sự và báo cáo tập trung.">
    <link rel="icon" type="image/jpeg" href="/icon.jpg" />
    <link rel="apple-touch-icon" href="/icon.jpg" />
    <link rel="manifest" href="/manifest.json" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&subset=vietnamese&display=swap" rel="stylesheet">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Inter"', 'system-ui', '-apple-system', 'sans-serif'],
            },
            colors: {
              canvas: '#FAFAFA',
              'primary-text': '#171717',
              'secondary-text': '#737373',
              accent: '#2563EB',
              'node-border': '#E5E5E5',
              'line-color': '#D4D4D4',
            },
            boxShadow: {
              'node': '0 1px 3px 0 rgba(0,0,0,0.07), 0 1px 2px -1px rgba(0,0,0,0.04)',
              'node-hover': '0 4px 16px 0 rgba(0,0,0,0.08), 0 1px 3px 0 rgba(0,0,0,0.04)',
              'float': '0 8px 32px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06)',
              'accent': '0 4px 16px rgba(37,99,235,0.20)',
            },
            backdropBlur: {
              xs: '4px',
            }
          }
        }
      }
    </script>

    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background-color: #FAFAFA;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        color: #171717;
        letter-spacing: -0.01em;
      }

      /* ── Canvas background ── */
      .dot-grid-bg {
        background-color: #FAFAFA;
      }

      /* ── Typography ── */
      h1, h2, h3, h4, h5 {
        letter-spacing: -0.03em;
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #D4D4D4; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #A3A3A3; }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* ── Animations ── */
      @keyframes fadeInScale {
        from { opacity: 0; transform: scale(0.97) translateY(4px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-12px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes shimmer {
        from { background-position: -200% center; }
        to   { background-position: 200% center; }
      }
      .animate-fade-in   { animation: fadeInScale 0.2s cubic-bezier(0.16,1,0.3,1) forwards; }
      .animate-slide-in  { animation: slideInLeft 0.2s cubic-bezier(0.16,1,0.3,1) forwards; }

      /* ── Focus Ring Override ── */
      *:focus-visible {
        outline: 2px solid #2563EB;
        outline-offset: 2px;
        border-radius: 6px;
      }

      /* ── Glassmorphism helper ── */
      .glass {
        background: rgba(255,255,255,0.72);
        backdrop-filter: blur(16px) saturate(1.6);
        -webkit-backdrop-filter: blur(16px) saturate(1.6);
        border: 1px solid rgba(255,255,255,0.6);
      }
      .glass-dark {
        background: rgba(23,23,23,0.75);
        backdrop-filter: blur(16px) saturate(1.4);
        -webkit-backdrop-filter: blur(16px) saturate(1.4);
      }

      /* ── Node cards ── */
      .node-card {
        background: #FFFFFF;
        border: 1px solid #E5E5E5;
        box-shadow: 0 1px 3px 0 rgba(0,0,0,0.07), 0 1px 2px -1px rgba(0,0,0,0.04);
        transition: box-shadow 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
      }
      .node-card:hover {
        box-shadow: 0 4px 16px 0 rgba(0,0,0,0.08), 0 1px 3px 0 rgba(0,0,0,0.04);
        border-color: #D4D4D4;
      }
      .node-card-active {
        border-color: #2563EB;
        box-shadow: 0 0 0 3px rgba(37,99,235,0.10), 0 4px 16px 0 rgba(37,99,235,0.12);
      }

      /* ── Floating toolbar pill ── */
      .toolbar-pill {
        background: rgba(255,255,255,0.90);
        backdrop-filter: blur(20px) saturate(1.8);
        -webkit-backdrop-filter: blur(20px) saturate(1.8);
        border: 1px solid #E5E5E5;
        box-shadow: 0 8px 32px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
        border-radius: 9999px;
        padding: 6px 8px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      /* ── Sidebar minimal ── */
      .sidebar-link {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 12px;
        border-radius: 8px;
        font-size: 13.5px;
        font-weight: 500;
        color: #737373;
        transition: background 0.14s ease, color 0.14s ease;
        cursor: pointer;
        border: none;
        width: 100%;
        text-align: left;
        background: transparent;
        letter-spacing: -0.01em;
      }
      .sidebar-link:hover {
        background: #F5F5F5;
        color: #171717;
      }
      /* Aurora UI / Minimalist Theme Base */
      body, #root {
        height: 100%;
        margin: 0;
        background-color: #F3F4F6;
        color: #262626;
      }
      
      .content-scroll::-webkit-scrollbar { display: none; }

      .aurora-mesh {
          position: fixed;
          top: 30%;
          left: 50%;
          transform: translate(-50%, -50%);
          width: 300px;
          height: 300px;
          z-index: 0;
          filter: blur(60px);
          opacity: 0.55;
          animation: pulse-mesh 12s infinite alternate ease-in-out;
          pointer-events: none;
      }

      .blob-1 {
          position: absolute; top: 0; left: 0; width: 180px; height: 180px;
          background: #BAE6FD;
          border-radius: 50%; mix-blend-mode: multiply;
          animation: drift 10s infinite alternate linear;
      }
      .blob-2 {
          position: absolute; top: 30px; right: 0; width: 150px; height: 150px;
          background: #FBCFE8;
          border-radius: 50%; mix-blend-mode: multiply;
          animation: drift 12s infinite-reverse linear;
      }
      .blob-3 {
          position: absolute; bottom: 0; left: 30px; width: 200px; height: 200px;
          background: #E9D5FF;
          border-radius: 50%; mix-blend-mode: multiply;
          animation: drift 8s infinite alternate linear;
      }
      
      @keyframes drift {
          0% { transform: translateY(0px) scale(1); }
          100% { transform: translateY(30px) scale(1.05); }
      }
      @keyframes pulse-mesh {
          0% { transform: translate(-50%, -50%) rotate(0deg); }
          100% { transform: translate(-50%, -48%) rotate(10deg); }
      }

      /* Minimal Cards & Buttons */
      .glass-card {
          background: rgba(255, 255, 255, 0.6);
          backdrop-filter: blur(24px);
          -webkit-backdrop-filter: blur(24px);
          border: 1px solid rgba(255, 255, 255, 0.9);
          border-radius: 20px;
          box-shadow: 0 4px 16px rgba(0,0,0,0.02);
      }
      
      .btn-surface {
          background-color: rgba(255, 255, 255, 0.85);
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
          border: 1px solid rgba(255, 255, 255, 1);
          border-radius: 14px;
          transition: all 0.2s ease;
      }
      .btn-surface:active {
          background-color: rgba(245, 245, 245, 0.85);
          transform: scale(0.98);
      }

      .bottom-menu {
          background: rgba(255, 255, 255, 0.85);
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
          border-top: 1px solid rgba(255,255,255,0.7);
      }

      * { box-sizing: border-box; }
      .sidebar-link.active {
        background: #171717;
        color: #FFFFFF;
        font-weight: 600;
      }
      .sidebar-link.active .sidebar-icon {
        color: #FFFFFF;
      }
      .sidebar-icon {
        color: #A3A3A3;
        flex-shrink: 0;
        transition: color 0.14s ease;
      }
      .sidebar-link:hover .sidebar-icon {
        color: #171717;
      }

      /* ── Accent button ── */
      .btn-accent {
        background: #2563EB;
        color: #fff;
        border: none;
        box-shadow: 0 4px 16px rgba(37,99,235,0.20);
        transition: background 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
      }
      .btn-accent:hover {
        background: #1d4ed8;
        box-shadow: 0 6px 24px rgba(37,99,235,0.28);
      }
      .btn-accent:active { transform: scale(0.98); }

      /* ── Monochrome button ── */
      .btn-mono {
        background: #171717;
        color: #fff;
        border: none;
        transition: background 0.15s ease, transform 0.1s ease;
      }
      .btn-mono:hover { background: #262626; }
      .btn-mono:active  { transform: scale(0.98); }

      /* ── Ghost button ── */
      .btn-ghost {
        background: transparent;
        border: 1px solid #E5E5E5;
        color: #404040;
        transition: background 0.14s ease, border-color 0.14s ease;
      }
      .btn-ghost:hover {
        background: #F5F5F5;
        border-color: #D4D4D4;
      }

      /* ── Input style ── */
      .input-minimal {
        background: #F5F5F5;
        border: 1px solid #E5E5E5;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 13.5px;
        font-weight: 500;
        color: #171717;
        transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
        outline: none;
        width: 100%;
      }
      .input-minimal::placeholder { color: #A3A3A3; }
      .input-minimal:focus {
        background: #fff;
        border-color: #2563EB;
        box-shadow: 0 0 0 3px rgba(37,99,235,0.10);
      }

      /* ── Divider line ── */
      .divider { background: #E5E5E5; height: 1px; width: 100%; }

      /* ── Badge ── */
      .badge-dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
      }

      /* ── Connecting line in schedule ── */
      .schedule-connector {
        border-color: #D4D4D4;
      }

      /* ── Status pill ── */
      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 10px;
        border-radius: 9999px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      /* ── Table ── */
      .table-minimal th {
        font-size: 11px;
        font-weight: 600;
        color: #737373;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 12px 16px;
        background: #FAFAFA;
        border-bottom: 1px solid #E5E5E5;
      }
      .table-minimal td {
        padding: 14px 16px;
        border-bottom: 1px solid #F5F5F5;
        font-size: 13.5px;
        color: #171717;
      }
      .table-minimal tr:last-child td { border-bottom: none; }
      .table-minimal tbody tr {
        transition: background 0.12s ease;
      }
      .table-minimal tbody tr:hover { background: #FAFAFA; }

      /* ── Progress bar ── */
      .progress-bar {
        height: 4px;
        border-radius: 9999px;
        background: #F5F5F5;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        border-radius: 9999px;
        background: #171717;
        transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1);
      }
      .progress-fill-accent {
        background: #2563EB;
      }

      /* ── Contextual hover actions ── */
      .action-reveal {
        opacity: 0;
        transform: translateY(4px);
        transition: opacity 0.15s ease, transform 0.15s ease;
      }
      .group:hover .action-reveal {
        opacity: 1;
        transform: translateY(0);
      }

    </style>
  <script type="importmap">
{
  "imports": {
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.93.3",

    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
